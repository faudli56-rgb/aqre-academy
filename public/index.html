<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية اقرأ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        .bg-primary { background: #0B1F4D; }
        .text-gold { color: #D4A017; }
        .bg-gold { background: #D4A017; }
        .page { display: block; }
        .page.hidden { display: none; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-50">
        <!-- الهيدر -->
        <header class="bg-primary text-white shadow-xl sticky top-0 z-50">
            <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div>
                        <h1 class="text-xl font-black">أكاديمية اقرأ</h1>
                        <p class="text-xs text-gold">للاستشارات والتدريب</p>
                    </div>
                </div>
                <nav class="hidden md:flex gap-6 text-sm">
                    <a href="#" onclick="showPage('home')" class="hover:text-gold transition">الرئيسية</a>
                    <a href="#" onclick="showPage('courses')" class="hover:text-gold transition">الدورات</a>
                    <a href="#" onclick="showPage('register')" class="hover:text-gold transition">تسجيل</a>
                    <a href="#" onclick="showPage('verify')" class="hover:text-gold transition">تحقق من الشهادة</a>
                </nav>
            </div>
        </header>

        <!-- المحتوى الرئيسي -->
        <main class="container mx-auto px-4 py-8">
            <!-- صفحة الرئيسية -->
            <div id="page-home" class="page">
                <div class="text-center py-12">
                    <h2 class="text-3xl font-black text-primary mb-4">مرحباً بكم في أكاديمية اقرأ</h2>
                    <p class="text-gray-600 max-w-2xl mx-auto">منصة متكاملة للتدريب والتأهيل المهني والاستشارات</p>
                    <div class="grid grid-cols-3 gap-4 max-w-lg mx-auto mt-8">
                        <div class="bg-white p-4 rounded-xl shadow">
                            <div class="text-2xl text-gold font-black" id="stat-courses">0</div>
                            <div class="text-xs text-gray-500">دورات</div>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow">
                            <div class="text-2xl text-gold font-black" id="stat-students">0</div>
                            <div class="text-xs text-gray-500">متدربين</div>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow">
                            <div class="text-2xl text-gold font-black" id="stat-certs">0</div>
                            <div class="text-xs text-gray-500">شهادات</div>
                        </div>
                    </div>
                    <button onclick="loadAllData()" class="mt-8 bg-gold hover:bg-yellow-600 text-primary font-bold px-6 py-3 rounded-xl transition">
                        <i class="fas fa-sync ml-2"></i>تحديث البيانات
                    </button>
                </div>
            </div>

            <!-- صفحة الدورات -->
            <div id="page-courses" class="page hidden">
                <h2 class="text-2xl font-black text-primary mb-6">📚 جميع الدورات</h2>
                <div id="courses-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </div>

            <!-- صفحة التسجيل -->
            <div id="page-register" class="page hidden">
                <h2 class="text-2xl font-black text-primary mb-6">📝 تسجيل متدرب جديد</h2>
                <form onsubmit="registerStudent(event)" class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow">
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">الاسم الرباعي (عربي)</label>
                        <input type="text" id="nameAr" required class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">الاسم (إنجليزي)</label>
                        <input type="text" id="nameEn" class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">رقم واتساب</label>
                        <input type="tel" id="whatsapp" required class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">الدورة</label>
                        <select id="course" required class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                            <option value="">اختر الدورة</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">كود المسوق (اختياري)</label>
                        <input type="text" id="marketerCode" class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                    </div>
                    <button type="submit" class="w-full bg-gold hover:bg-yellow-600 text-primary font-bold py-3 rounded-xl transition">
                        سجل الآن
                    </button>
                    <div id="register-result" class="mt-4 text-center"></div>
                </form>
            </div>

            <!-- صفحة التحقق من الشهادة -->
            <div id="page-verify" class="page hidden">
                <h2 class="text-2xl font-black text-primary mb-6">🔍 التحقق من صحة الشهادة</h2>
                <div class="max-w-lg mx-auto bg-white p-6 rounded-2xl shadow">
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-2">رقم الشهادة</label>
                        <input type="text" id="certId" placeholder="مثال: CERT123" class="w-full px-4 py-2 rounded-xl border focus:ring-2 focus:ring-gold">
                    </div>
                    <button onclick="verifyCertificate()" class="w-full bg-primary hover:bg-blue-900 text-white font-bold py-3 rounded-xl transition">
                        تحقق
                    </button>
                    <div id="verify-result" class="mt-4 text-center"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // إعدادات الاتصال بالـ API
        // ============================================================
        const API_BASE = '/api';

        // ============================================================
        // دوال الاتصال بالخادم
        // ============================================================

        async function callAPI(action, params = [], method = 'GET') {
            try {
                const url = new URL(`${API_BASE}?action=${action}&api=true`);
                if (method === 'GET' && params.length > 0) {
                    url.searchParams.append('param', params[0]);
                }

                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };

                if (method === 'POST') {
                    options.body = JSON.stringify({ action, params });
                }

                const response = await fetch(url.toString(), options);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { success: false, error: error.message };
            }
        }

        // ============================================================
        // تحميل البيانات
        // ============================================================

        async function loadStats() {
            const data = await callAPI('getStats');
            if (data && !data.error) {
                document.getElementById('stat-courses').textContent = data.courses || 0;
                document.getElementById('stat-students').textContent = data.students || 0;
                document.getElementById('stat-certs').textContent = data.certs || 0;
            }
        }

        async function loadCourses() {
            const courses = await callAPI('getCourses');
            if (Array.isArray(courses) && !courses.error) {
                // عرض الدورات
                const container = document.getElementById('courses-container');
                container.innerHTML = courses.map(c => `
                    <div class="bg-white rounded-2xl shadow overflow-hidden hover:shadow-lg transition">
                        <img src="${c.image || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=800'}" alt="${c.title}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <h3 class="font-bold text-primary text-lg">${c.title}</h3>
                            <p class="text-sm text-gray-600">👨‍🏫 المدرب: ${c.trainer || 'غير محدد'}</p>
                            <p class="text-sm text-gray-600">⏱️ المدة: ${c.duration || 'غير محدد'}</p>
                            <p class="text-gold font-bold mt-2">${c.fee || 'تواصل معنا'}</p>
                        </div>
                    </div>
                `).join('');

                // تعبئة قائمة الدورات في نموذج التسجيل
                const select = document.getElementById('course');
                select.innerHTML = '<option value="">اختر الدورة</option>' + 
                    courses.map(c => 
                        `<option value="${c.title}">${c.title}</option>`
                    ).join('');
            }
        }

        async function loadAllData() {
            await loadStats();
            await loadCourses();
        }

        // ============================================================
        // تسجيل متدرب
        // ============================================================

        async function registerStudent(event) {
            event.preventDefault();
            const resultDiv = document.getElementById('register-result');
            resultDiv.innerHTML = '<span class="text-blue-500">⏳ جاري التسجيل...</span>';

            const studentData = {
                nameAr: document.getElementById('nameAr').value,
                nameEn: document.getElementById('nameEn').value || '',
                whatsapp: document.getElementById('whatsapp').value,
                course: document.getElementById('course').value,
                marketerCode: document.getElementById('marketerCode').value || '',
                gender: '',
                nationality: '',
                residence: '',
                governorate: '',
                platform: 'موقع Vercel'
            };

            const result = await callAPI('registerStudent', [studentData], 'POST');
            
            if (result.success) {
                resultDiv.innerHTML = `<span class="text-green-600">✅ تم التسجيل بنجاح! رقم الطلب: ${result.orderID}</span>`;
                event.target.reset();
            } else {
                resultDiv.innerHTML = `<span class="text-red-600">❌ خطأ: ${result.error || 'فشل التسجيل'}</span>`;
            }
        }

        // ============================================================
        // التحقق من الشهادة
        // ============================================================

        async function verifyCertificate() {
            const certId = document.getElementById('certId').value.trim();
            const resultDiv = document.getElementById('verify-result');
            
            if (!certId) {
                resultDiv.innerHTML = '<span class="text-red-600">⚠️ الرجاء إدخال رقم الشهادة</span>';
                return;
            }

            resultDiv.innerHTML = '<span class="text-blue-500">⏳ جاري التحقق...</span>';
            
            const result = await callAPI('verifyCertificate', [certId]);
            
            if (result && result.found) {
                resultDiv.innerHTML = `
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-right">
                        <p class="text-green-700 font-bold">✅ شهادة صحيحة</p>
                        <p class="text-sm"><strong>رقم الشهادة:</strong> ${result.id}</p>
                        <p class="text-sm"><strong>الاسم:</strong> ${result.studentAr}</p>
                        <p class="text-sm"><strong>الدورة:</strong> ${result.course}</p>
                        <p class="text-sm"><strong>التاريخ:</strong> ${result.date || 'غير محدد'}</p>
                        ${result.pdfUrl && result.pdfUrl !== '#' ? `<a href="${result.pdfUrl}" target="_blank" class="text-blue-600 underline text-sm">📄 عرض الشهادة</a>` : ''}
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `<span class="text-red-600">❌ الشهادة غير موجودة أو الرقم غير صحيح</span>`;
            }
        }

        // ============================================================
        // التنقل بين الصفحات
        // ============================================================

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            const page = document.getElementById(`page-${pageId}`);
            if (page) {
                page.classList.remove('hidden');
                // تحميل البيانات عند التبديل للصفحات
                if (pageId === 'home') loadStats();
                if (pageId === 'courses') loadCourses();
            }
        }

        // ============================================================
        // تحميل البيانات عند بدء التشغيل
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            loadAllData();
        });
    </script>
</body>
</html>
